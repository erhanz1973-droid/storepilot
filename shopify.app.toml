# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "65ef315b32098769438404654f2d4688"
name = "StorePilot"
application_url = "https://storepilot-production-d591.up.railway.app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_orders,read_customers,read_inventory,read_discounts,read_content,write_products,write_discounts,write_metaobjects,write_metaobject_definitions"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2025-10"

  # All webhook topics deliver to the single implemented handler.
  [[webhooks.subscriptions]]
  uri = "/api/shopify/webhooks"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/api/shopify/webhooks"
  topics = [ "app/scopes_update" ]

  # Mandatory App Store compliance webhooks (GDPR). Delivered to the Next.js handler.
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/api/shopify/webhooks"

[auth]
redirect_urls = [
  "https://storepilot-production-d591.up.railway.app/auth/callback",
  "https://storepilot-production-d591.up.railway.app/api/shopify/callback",
]

[build]
# Keep dev tunnels from overwriting the production App URL in the Partner dashboard.
automatically_update_urls_on_dev = false
